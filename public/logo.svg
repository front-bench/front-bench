<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- <fb/> rendered as geometric paths — no font dependency -->
  <!-- Glyph height 196px, vertically centred (top=158, bottom=354), stroke=20 -->
  <g stroke="url(#g)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- < -->
    <polyline points="122,158 62,256 122,354"/>
    <!-- f: hook at top + stem + crossbar -->
    <path d="M 198,164 C 198,158 162,153 162,180 V 354"/>
    <line x1="150" y1="248" x2="197" y2="248"/>
    <!-- b: stem + half-oval bowl -->
    <line x1="233" y1="158" x2="233" y2="354"/>
    <path d="M 233,256 C 293,256 293,354 233,354"/>
    <!-- / -->
    <line x1="369" y1="158" x2="307" y2="354"/>
    <!-- > -->
    <polyline points="390,158 450,256 390,354"/>
  </g>
</svg>
